<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List with Cart Counter</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }
        .product-card {
            min-height: 250px;
        }
        .confirmation {
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<!-- Navbar with Cart Counter -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">My E-Commerce Store</span>
    <span class="text-white">
        🛒 Cart: <span id="cart-count" class="badge bg-warning text-dark">0</span>
    </span>
</nav>

<div class="container mt-5">
    <div class="row g-4" id="product-list">

        <!-- Product 1 -->
        <div class="col-md-3">
            <div class="card product-card p-3 text-center shadow-sm">
                <h5>Wireless Mouse</h5>
                <p>$20</p>
                <button class="btn btn-primary add-cart">Add to Cart</button>
                <div class="confirmation"></div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-3">
            <div class="card product-card p-3 text-center shadow-sm">
                <h5>Bluetooth Headphones</h5>
                <p>$50</p>
                <button class="btn btn-primary add-cart">Add to Cart</button>
                <div class="confirmation"></div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-3">
            <div class="card product-card p-3 text-center shadow-sm">
                <h5>Smart Watch</h5>
                <p>$120</p>
                <button class="btn btn-primary add-cart">Add to Cart</button>
                <div class="confirmation"></div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-md-3">
            <div class="card product-card p-3 text-center shadow-sm">
                <h5>Keyboard</h5>
                <p>$35</p>
                <button class="btn btn-primary add-cart">Add to Cart</button>
                <div class="confirmation"></div>
            </div>
        </div>

    </div>
</div>

<script>
$(document).ready(function(){

    var cartCount = 0;

    // Event Delegation
    $("#product-list").on("click", ".add-cart", function(){

        cartCount++;

        // Update Cart Counter
        $("#cart-count").text(cartCount);

        // Disable Button
        $(this).prop("disabled", true);
        $(this).text("Added");
        $(this).attr("class", "btn btn-success");

        // Show Confirmation Message
        $(this).siblings(".confirmation")
               .text("✔ Product added successfully!")
               .addClass("text-success");

    });

});
</script>

</body>
</html>
