<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive To-Do List</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Basic Styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .todo-container {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        .task-input {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .stats {
            margin-top: 15px;
            font-size: 14px;
        }

        .delete-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 8px;
        }
    </style>
</head>
<body>

<div class="todo-container">
    <h2>To-Do List</h2>

    <div class="task-input">
        <input type="text" id="task-input" placeholder="Enter new task">
        <button id="add-task">Add</button>
    </div>

    <ul id="task-list"></ul>

    <div class="stats">
        Total Tasks: <span id="total-count">0</span> |
        Completed: <span id="completed-count">0</span>
    </div>
</div>

<script>
$(document).ready(function(){

    function updateCounts(){
        var total = $("#task-list li").length;
        var completed = $("#task-list li.completed").length;

        $("#total-count").text(total);
        $("#completed-count").text(completed);
    }

    // Add Task
    $("#add-task").on("click", function(){

        var taskText = $("#task-input").val().trim();

        if(taskText !== ""){
            
            var newTask = `
                <li>
                    <span class="task-text">${taskText}</span>
                    <button class="delete-btn">Delete</button>
                </li>
            `;

            $("#task-list").append(newTask);

            $("#task-input").val("");
            updateCounts();
        }
    });

    // Mark as Completed (Event Delegation)
    $("#task-list").on("click", ".task-text", function(){
        $(this).parent().toggleClass("completed");
        updateCounts();
    });

    // Delete Task (Event Delegation)
    $("#task-list").on("click", ".delete-btn", function(){
        $(this).parent().remove();
        updateCounts();
    });

});
</script>

</body>
</html>
