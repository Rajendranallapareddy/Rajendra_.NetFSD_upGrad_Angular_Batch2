<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Feedback Form</title>

    <!-- Bootstrap CSS (for simple styling only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery CDN (Required) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }
        .feedback-container {
            max-width: 500px;
            margin: 60px auto;
        }
    </style>
</head>
<body>

<div class="container feedback-container">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">Student Feedback Form</h3>

        <form id="feedbackForm">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" id="name" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Course Rating</label>
                <select id="rating" class="form-select">
                    <option value="">Select Rating</option>
                    <option>Excellent</option>
                    <option>Good</option>
                    <option>Average</option>
                    <option>Poor</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Comments</label>
                <textarea id="comments" class="form-control" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>

        <!-- Message will appear here -->
        <div id="message" class="mt-3"></div>

    </div>
</div>

<script>
$(document).ready(function(){

    $("#feedbackForm").submit(function(event){

        event.preventDefault(); // Prevent page reload

        // Get values using jQuery
        var name = $("#name").val().trim();
        var email = $("#email").val().trim();

        // Clear previous message
        $("#message").html("");

        // Validation
        if(name === "" || email === ""){
            $("#message").html(
                "<div class='alert alert-danger'>Please enter both Name and Email.</div>"
            );
        } 
        else {
            $("#message").html(
                "<div class='alert alert-success'>Thank you for your feedback!</div>"
            );

            // Clear form fields
            $("#feedbackForm")[0].reset();
        }

    });

});
</script>

</body>
</html>
