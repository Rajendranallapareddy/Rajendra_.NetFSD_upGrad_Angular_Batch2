<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Forms Demo</title>
</head>
<body>
    <div class="container">
      <form action="/" method="post">
        <div class="mb-3">
            <label for="" class="form-label" >Email:</label>
            <input type="email" class="form-control" id="txtEmail" placeholder="Enter Email Address">
        </div>
        <div class="mb-3">
            <label for="" class="form-label" >Address:</label>
            <input type="text" class="form-control" id="txtAddress" placeholder="Enter an Address">
        </div>
        <div class="mb-3">
            <label for="" class="form-label" >Password:</label>
            <input type="password" class="form-control" id="txtPassword" placeholder="Enter a Password" aria-describedby="passwordHelpBlock" >
            <div id="passwordHelpBlock" class="form-text">
                Your Password must be 10 char. in length, 1-uppercase, 1-lowercase
            </div>
        </div>
        <div class="mb-3">
            <label for="ddlcountry" class="form-label">Country</label>
            <input class="form-control" list="listCountry" id="ddlcountry" placeholder="select a country">
            <datalist id="listCountry">
                <option value="In">India</option>
                <option value="Sr">Srilanka</option>
                <option value="ch">China</option>
            </datalist>
        </div>
        <div class="mb-3">
            <label for="" class="form-label">Gender</label>
            <select class="form-select">
                <option  selected value="">--Select--</option>
                <option  value="Male">Male</option>
                <option  value="Female">Female</option>
            </select>
        </div>
         <div class="mb-3">
            <input type="checkbox" class="form-check-input" value="Gold">
            <label for="" class="form-check-label">Gold</label>
        </div>
        <div class="mb-3">
            <input type="radio" value="Male" checked class="form-check-input" name="gender">
            <label class="form-check-label" for="">Male</label>

            <input type="radio" value="Female" class="form-check-input" name="gender">
            <label class="form-check-label" for="">Female</label>
        </div>
         <div class="mb-3">
            <div class="form-check form-switch">
                <input type="checkbox" role="switch" value="On" class="form-check-input">
                <label for="" class="form-check-label">Agree</label>
            </div>
        </div>
         <div class="mb-3">
            <label for="" class="form-label">volume:</label>
            <input type="range" min="0" max="100" value="0" class="form-range">
        </div>
        <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="enter email id username" aria-describedby="emailid">
            <span class="input-group-text" id="emailid">@codempoweracademy.com</span>
         </div>
         <div class="form-floating mb-3">
            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Email address</label>
        </div>
        <div class="mb-3">
            <input type="submit" class="btn btn-success" value="Submit">
        </div>
      </form>

    </div>
</body>
</html>
