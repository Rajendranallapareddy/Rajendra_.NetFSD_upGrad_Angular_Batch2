<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Simple Grid Demo</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <!--form1-->
                <div class="mb-3">
                    <label for="txtemail" class="form-label" >Email:</label>
                    <input type="email" class="form-control" id="txtemail" placeholder="Enter an offical email id">
                </div>
                <div class="mb-3">
                    <label for="txtAddress" class="form-label" >Address:</label>
                    <input type="text" class="form-control" id="txtAddress" placeholder="Enter your address">
                </div>
            </div>
            <div class="col-md-4">
               <!--form2-->
                <div class="mb-3">
                    <label for="txtpass" class="form-label" >Password:</label>
                    <input type="password" class="form-control" id="txtpass" placeholder="Enter your password" aria-describedby="passwordHelpBlock">
                    <div id="passwordHelpBlock" class="form-text">
                        Your password must be 10-15char. long, contain 1 special char,1 uppercase, 1 numeric
                    </div>
                </div>
                <div class="mb-3">
                    <label for="ddlcountry" class="form-label">Country</label>
                    <input class="form-control" list="listCountry" id="ddlcountry" placeholder="select a country">
                    <datalist id="listCountry">
                        <option value="In">India</option>
                        <option value="Sr">Srilanka</option>
                        <option value="ch">China</option>
                    </datalist>
                </div>
            </div>
            <div class="col-md-4" >
                <!--form3-->
                <div class="mb-3">
                    <label for="" class="form-label">Gender</label>
                    <select class="form-select">
                        <option  selected value="">--Select--</option>
                        <option  value="Male">Male</option>
                        <option  value="Female">Female</option>
                    </select>
                </div>
                <div class="mb-3">
                    <input type="checkbox" class="form-check-input" value="Gold">
                    <label for="" class="form-check-label">Gold</label>
                </div>
            </div>
        </div>
       
    </div>
</body>
</html>
