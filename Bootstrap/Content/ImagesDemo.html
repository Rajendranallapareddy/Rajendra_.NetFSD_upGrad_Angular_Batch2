<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Images Demo</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                 <img src="../Images/img1.jpg" class="img-fluid rounded" alt="image not found">
            </div>
            <div class="col-sm-4">
                 <img src="../Images/img2.jpg" height="100px" width="100px" class="img-thumbnail rounded" alt="image not found">
            </div>
            <div class="col-sm-4">
                 <figure>
                    <img src="../Images/img2.jpg"  class="figure-img img-fluid rounded">
                    <figcaption class="figure-caption text-end">Good Morning</figcaption>
                 </figure>
            </div>
        </div>
       
    </div>
</body>
</html>
