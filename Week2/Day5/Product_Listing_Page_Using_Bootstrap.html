<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electronics Store</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ================= HEADER ================= -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold">ElectroMart</span>
    </div>
</nav>

<!-- ================= PRODUCT SECTION ================= -->
<div class="container">

    <h2 class="text-center mb-4 fw-bold">Our Products</h2>

    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://i.dell.com/is/image/DellContent/content/dam/ss2/product-images/dell-client-products/notebooks/dell/16250/media-gallery/platinum-plastic/non-fpr/notebook-dc16250-silver-gallery-1.psd?fmt=png-alpha&pscan=auto&scl=1&hei=402&wid=508&qlt=100,1&resMode=sharp2&size=508,402&chrss=full" class="card-img-top" alt="Laptop">

                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">High performance laptop for work and gaming.</p>
                    <p class="fw-bold text-primary">$999</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://rukminim2.flixcart.com/image/3072/3072/xif0q/mobile/n/v/e/-original-imahft5gfchxyewy.jpeg?q=90" class="card-img-top" alt="Smartphone">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text">Latest smartphone with amazing features.</p>
                    <p class="fw-bold text-primary">$699</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://m.media-amazon.com/images/I/61cIHzCDl6L._SX522_.jpg" class="card-img-top" alt="Headphones">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">Noise cancelling over-ear headphones.</p>
                    <p class="fw-bold text-primary">$199</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcRO9o0fuLlWdl7CeOw5OrsIWS1ADxKcsazNAHTzSBYWUvt3NFrnIaNbRV_S-xBroZhVmptX8vJpLNtrsgzKn0CMl53E8i6WpTwBweeF729p3W_zBKTfBrdUvA" class="card-img-top" alt="Smart Watch">

                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text">Track fitness and notifications easily.</p>
                    <p class="fw-bold text-primary">$249</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
